title: "[RFC] "
labels:
  - rfc
body:
  - type: markdown
    attributes:
      value: |
        Use this form for design proposals and RFCs.

        Use GitHub Issues for implementation work after an RFC is accepted.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What are you proposing, and why?
      placeholder: One-paragraph summary
    validations:
      required: true

  - type: textarea
    id: problem_statement
    attributes:
      label: Problem Statement
      description: What problem or limitation does this solve?
      placeholder: Describe the current problem, who is affected, and the impact.
    validations:
      required: true

  - type: textarea
    id: goals
    attributes:
      label: Goals
      placeholder: |
        - Goal 1
        - Goal 2
    validations:
      required: true

  - type: textarea
    id: non_goals
    attributes:
      label: Non-Goals
      placeholder: |
        - Out of scope 1
        - Out of scope 2

  - type: textarea
    id: proposed_change
    attributes:
      label: Proposed Change
      description: Describe the design, affected resources/files, and expected behavior.
      placeholder: Include classes, properties, vocabularies, contexts, manifests, URLs/IRIs, and examples as needed.
    validations:
      required: true

  - type: textarea
    id: examples
    attributes:
      label: Examples (Optional but Recommended)
      description: Include before/after examples, JSON-LD snippets, or manifest examples.
      placeholder: |
        ```json
        {
          "example": true
        }
        ```

  - type: textarea
    id: compatibility_migration
    attributes:
      label: Compatibility / Migration Impact
      description: Backward compatibility, breaking changes, migration or deprecation notes.
      placeholder: What will existing consumers need to change (if anything)?

  - type: textarea
    id: alternatives_considered
    attributes:
      label: Alternatives Considered
      description: What other options were considered, and why are they not preferred?

  - type: textarea
    id: risks_drawbacks
    attributes:
      label: Risks / Drawbacks
      description: Technical, operational, or maintenance risks and mitigations.

  - type: textarea
    id: open_questions
    attributes:
      label: Open Questions (Feedback Requested)
      description: What specific questions do you want reviewers to answer?
      placeholder: |
        - Should we ... ?
        - Is ... acceptable?

  - type: textarea
    id: rollout_plan
    attributes:
      label: Rollout / Implementation Plan (Optional)
      description: If accepted, what are the likely next steps?
      placeholder: |
        1. Update schema artifacts
        2. Regenerate manifest
        3. Update docs/examples
        4. Open implementation issue(s)
